<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wait! Don't be mad!</title>
    <style>
        body { text-align: center; font-family: 'Comic Sans MS', cursive; background-color: #fff0f5; color: #5d4037; padding: 50px; overflow: hidden; }
        .box { background: white; padding: 40px; border-radius: 30px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px solid #f8bbd0; }
        .btn-yes { background: #81c784; color: white; padding: 15px 30px; border: none; border-radius: 20px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-yes:hover { transform: scale(1.1); }
        .btn-no { background: #e57373; color: white; padding: 10px 20px; border: none; border-radius: 20px; position: absolute; cursor: not-allowed; transition: 0.1s; }
        .flirt { font-size: 20px; color: #d81b60; margin-top: 20px; font-weight: bold; max-width: 400px; line-height: 1.5; }
    </style>
</head>
<body>
    <audio id="track" src="espresso.mp3" autoplay loop></audio>
    
    <div class="box">
        <h1>Okay, listen... 👑</h1>
        <p>I am 6'2 here and you are a shorty here, so just forgive me already! 📏🤏🥺✨</p>
        <div class="flirt">
            "I like to  teasing you , and you know, you look so cute without makeup .... so adorable...after metting u i am start beliving on my mom feary's story....that angles still exicest " 😉✨
        </div>
        <br><br>
        <a href="forgiven.html"><button class="btn-yes">Okay, I forgive you now!</button></a>
        <button class="btn-no" onmouseover="runAway()" id="noBtn">Still mad</button>
    </div>

    <script>
        function runAway() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }
    </script>
</body>
</html>
